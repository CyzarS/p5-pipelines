name: CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - master
  pull_request:
    branches: 
      - main
      - master

env:
  AWS_REGION: us-east-1
  APP_NAME: productos-api

jobs:
  build:
    name: Build y Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
    
    - name: Configurar Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Cache de dependencias
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest
    
    - name: Lint con flake8
      run: |
        # Detener el build si hay errores de sintaxis o nombres indefinidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias (no detiene el build)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Validar estructura del proyecto
      run: |
        echo "Verificando archivos requeridos..."
        test -f app.py || (echo "Error: app.py no encontrado" && exit 1)
        test -f requirements.txt || (echo "Error: requirements.txt no encontrado" && exit 1)
        test -f Dockerfile || (echo "Error: Dockerfile no encontrado" && exit 1)
        echo "✓ Todos los archivos requeridos están presentes"
    
    - name: Mostrar información del build
      run: |
        echo "Build completado exitosamente"
        echo "Commit: ${{ github.sha }}"
        echo "Rama: ${{ github.ref_name }}"
        echo "Ambiente: Producción"

  docker:
    name: Build y Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login a Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extraer metadata para Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value={{branch}}-{{date 'YYYYMMDD-HHmmss'}}
    
    - name: Build y push de imagen Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:buildcache,mode=max
    
    - name: Mostrar información de la imagen
      run: |
        echo "Imagen Docker construida y publicada exitosamente"
        echo "Tags creados:"
        echo "${{ steps.meta.outputs.tags }}"

  deploy:
    name: Deploy a EC2
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy a EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # Colores para output
          GREEN='\033[0;32m'
          BLUE='\033[0;34m'
          NC='\033[0m'
          
          echo -e "${BLUE}Iniciando despliegue...${NC}"
          
          # Detener y eliminar contenedor anterior si existe
          echo -e "${BLUE}Deteniendo contenedor anterior...${NC}"
          sudo docker stop ${{ env.APP_NAME }} 2>/dev/null || true
          sudo docker rm ${{ env.APP_NAME }} 2>/dev/null || true
          
          # Limpiar imágenes antiguas
          echo -e "${BLUE}Limpiando imágenes antiguas...${NC}"
          sudo docker image prune -af
          
          # Hacer login en Docker Hub
          echo -e "${BLUE}Autenticando con Docker Hub...${NC}"
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Pull de la nueva imagen
          echo -e "${BLUE}Descargando nueva imagen...${NC}"
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
          
          # Ejecutar nuevo contenedor
          echo -e "${BLUE}Iniciando nuevo contenedor...${NC}"
          sudo docker run -d \
            --name ${{ env.APP_NAME }} \
            --restart unless-stopped \
            -p 80:5000 \
            -e ENVIRONMENT=prod \
            -e AWS_REGION=${{ env.AWS_REGION }} \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:latest
          
          # Esperar a que el contenedor inicie
          echo -e "${BLUE}Esperando que la aplicación inicie...${NC}"
          sleep 5
          
          # Verificar que el contenedor está corriendo
          if [ $(sudo docker ps -q -f name=${{ env.APP_NAME }}) ]; then
            echo -e "${GREEN}✓ Contenedor iniciado exitosamente${NC}"
            
            # Health check
            echo -e "${BLUE}Ejecutando health check...${NC}"
            sleep 3
            curl -f http://localhost/health || echo "Advertencia: Health check falló"
            
            echo -e "${GREEN} Despliegue completado exitosamente${NC}"
          else
            echo "Error: El contenedor no está corriendo"
            sudo docker logs ${{ env.APP_NAME }}
            exit 1
          fi
          
          # Logout de Docker
          sudo docker logout
    
    - name: Notificar resultado del deploy
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo " Deploy exitoso a http://${{ secrets.EC2_HOST }}"
        else
          echo " Deploy falló"
        fi
